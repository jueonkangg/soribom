<text x="166" y="286" text-anchor="middle" font-size="13" fill="#FFFFFF" font-weight="700">선생님</text>
<text x="226" y="286" font-size="16" fill="#1F2937">좋은 질문이에요. 잎의 세포 안에 있어요.</text>
<text x="120" y="312" font-size="13" fill="#94A3B8">… 임시 자막(흐림)은 잠시 뒤 정확한 자막으로 교정됩니다 …</text>
