audio:
  device: "ReSpeaker"      # 부분 문자열로 매칭
  sample_rate: 16000
  channels: 4
  block_ms: 30

vad:
  model: "silero"
  threshold: 0.5
  min_speech_ms: 250
  min_silence_ms: 400
  speech_pad_ms: 200       # 발화 앞에 붙일 여유 (첫 음절 잘림 방지)

stt:
  # small 단일 패스. 원래 2-패스(small→medium) 설계였으나, 실측에서
  #  (1) medium은 8GB 공유메모리에 앱과 함께 올리면 OOM 나고(예산 총 150만원 제약),
  #  (2) 정확도도 small과 사실상 동일했다(둘 다 CER ~1%, 잡음에도 강함 — ReSpeaker
  #      ch0의 하드웨어 빔포밍 덕분),
  #  (3) 문맥 기반 2-패스 교정도 정확도를 못 올렸다.
  # 그래서 small 하나로 확정. 발화당 ~0.5초, GPU 메모리 여유.
  model: "small"
  language: "ko"
  # 수업에 나올 용어를 힌트로 주면 인식이 올바른 후보로 정렬돼 오인식이 준다(생성이 아니라
  # 인식 편향). 실측: "광합성→광업성" 같은 오류가 교정돼 CER 1.4%→0.0%. 과목에 맞게 바꾼다.
  prompt: "광합성, 이산화탄소, 포도당, 칠판, 수행평가, 교과서"
  # CTranslate2를 CUDA로 소스빌드(v4.5.0)해 GPU로 돌린다. 순수 int8이 이 메모리에 맞는다.
  compute_type: "int8"
  device: "cuda"
  beam_size: 1             # 1 = 가장 빠름. 정확도가 더 필요하면 올리되 느려진다
  cpu_threads: 0           # 0 = 자동 (device: cpu 로 폴백할 때만 의미 있음)

doa:
  enabled: true
  smoothing: 0.3           # 지수이동평균 계수

events:
  enabled: true
  labels: ["이름 호명", "종소리", "질문", "경보"]
  threshold: 0.6

tts:
  engine: "piper"
  voice: "ko_KR-<voice>"   # 다운로드한 음성 모델 이름
  output_device: "plughw:2,0"   # I2S 사운드카드 (aplay -l 로 확인)
  max_chars: 200

relay:
  # 깨끗한 소리 전달 (블루투스)
  enabled: true
  agc: true
  safety_limiter_db: -6.0  # 출력 상한 (반드시 유지)

summary:
  method: "extractive"     # 생성식 아님 — 없는 말을 지어내지 않는다
  top_k: 8
  output_dir: "./notes"
